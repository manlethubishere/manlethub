<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANLET</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:white;
  overflow-x:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  z-index:999;
}

#logo{
  position:absolute;
  width:120px;
  animation:myntra 3s cubic-bezier(0.25,1,0.5,1) forwards;
}

@keyframes myntra{
  0%{top:50%;left:50%;transform:translate(-50%,-50%) scale(0.5);opacity:0}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  50%{transform:translate(-50%,-50%) scale(1)}
  70%{transform:translate(-50%,-50%) scale(1.05)}
  100%{top:10px;left:15px;transform:scale(0.7);}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
}
.menu{font-size:22px;cursor:pointer;}
.title{font-weight:bold;}
.cart{font-size:20px;cursor:pointer;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-220px;
  top:0;
  width:200px;
  height:100%;
  background:white;
  box-shadow:2px 0 10px rgba(0,0,0,0.1);
  transition:.3s;
  z-index:100;
}
.sidebar div{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.sidebar div.active{
  background:#0b2e13;
  color:white;
}

/* HOME */
.home{padding:15px;}
.search{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* PRODUCTS */
.products{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.card{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
}
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}
.price{text-decoration:line-through;color:gray;}
.discount{color:green;font-weight:bold;}

/* PAGE SLIDE */
.page{
  position:absolute;
  width:100%;
  top:0;
  left:100%;
  background:white;
  min-height:100vh;
  transition:.35s ease;
}
.page.active{left:0;}

/* DETAIL */
#detail{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:none;
  padding:20px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img id="logo" src="logo.png">
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div onclick="openPage('perfume')">Perfumes</div>
  <div onclick="openPage('grocery')">Grocery</div>
  <div onclick="openPage('beverages')">Beverages</div>
  <div onclick="openPage('namkeen')">Namkeen</div>
  <div onclick="openPage('beauty')">Beauty</div>
  <div onclick="openPage('fashion')">Fashion</div>
  <div onclick="openPage('electronics')">Electronics</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="title">MANLET</div>
  <div class="cart" onclick="sendCart()">🛒</div>
</div>

<!-- HOME -->
<div class="home" id="home">
  <input class="search" placeholder="Search products...">
</div>

<!-- PRODUCT PAGE -->
<div class="page" id="page">
  <div class="products" id="products"></div>
</div>

<!-- DETAIL -->
<div id="detail"></div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},3000);

const phone="918638618446";
let cart=[];

const data={
  perfume:[{name:"Vokka Perfume",mrp:500,price:250,discount:"50%",img:"vokka-perfume.jpg"}],
  grocery:[{name:"Tata Haldi",mrp:300,price:150,discount:"50%",img:"tata-haldi.jpg"}],
  beauty:[{name:"Mamaearth Facewash",mrp:300,price:150,discount:"50%",img:"mamaearth-facewash.jpg"}],
  fashion:[{name:"GenZ T-Shirt",mrp:500,price:150,discount:"50%",img:"genz-tshirt.jpg"}],
  namkeen:[{name:"Aloo Bhujia",mrp:200,price:100,discount:"50%",img:"aloo-bhujia.jpg"}],
  beverages:[{name:"Coca Cola",mrp:50,price:40,discount:"10%",img:"cocacola.jpg"}],
  electronics:[{name:"Smart TV",mrp:13999,price:4699,discount:"67%",img:"smart-tv.jpg"}]
};

function toggleMenu(){
  let s=document.getElementById("sidebar");
  s.style.left = s.style.left==="0px" ? "-220px" : "0px";
}

function openPage(cat){
  document.getElementById("sidebar").style.left="-220px";
  document.getElementById("home").style.display="none";
  let page=document.getElementById("page");
  page.classList.add("active");

  const c=document.getElementById("products");
  c.innerHTML="";
  data[cat].forEach(p=>{
    c.innerHTML+=`
    <div class="card" onclick="showDetail('${p.name}',${p.mrp},${p.price},'${p.discount}')">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p class="price">₹${p.mrp}</p>
      <p>₹${p.price}</p>
      <p class="discount">${p.discount} OFF</p>
    </div>`;
  });
}

function showDetail(name,mrp,price,discount){
  let d=document.getElementById("detail");
  d.style.display="block";
  d.innerHTML=`
  <h2>${name}</h2>
  <p><strike>₹${mrp}</strike></p>
  <h3>₹${price}</h3>
  <p style="color:green">${discount} OFF</p>
  <button onclick="addToCart('${name}',${price})">Add to Cart</button>
  <button onclick="buyNow('${name}',${price})">Buy Now</button>
  <button onclick="closeDetail()">Back</button>`;
}

function closeDetail(){
  document.getElementById("detail").style.display="none";
}

function addToCart(name,price){
  let f=cart.find(p=>p.name===name);
  if(f){f.qty++} else {cart.push({name,price,qty:1})}
  alert("Added");
}

function buyNow(name,price){
  let msg=`🛒 MANLET ORDER%0A${name}%0A₹${price}`;
  window.open(`https://wa.me/${phone}?text=${msg}`);
}

function sendCart(){
  let total=0,msg="🛒 MANLET ORDER%0A";
  cart.forEach(p=>{
    let sub=p.price*p.qty;
    total+=sub;
    msg+=`${p.name} x${p.qty} = ₹${sub}%0A`;
  });
  msg+=`Total: ₹${total}`;
  window.open(`https://wa.me/${phone}?text=${msg}`);
}

</script>

</body>
</html>
