<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANLET</title>

<style>
body{margin:0;font-family:Arial;background:#fff;color:#000}

/* SPLASH */
#splash{
position:fixed;width:100%;height:100%;
background:#fff;display:flex;justify-content:center;align-items:center;
z-index:999;
}
#logo{width:120px;animation:zoom 2s ease;}
@keyframes zoom{
0%{transform:scale(0.5);opacity:0}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:#000;color:#fff;
}

/* SIDEBAR */
.sidebar{
position:fixed;left:-220px;top:0;width:200px;height:100%;
background:#000;color:#fff;transition:.3s;z-index:100;
}
.sidebar div{padding:14px;border-bottom:1px solid #333;cursor:pointer}

/* PRODUCTS */
.products{
display:grid;grid-template-columns:repeat(2,1fr);
gap:12px;padding:10px;
}
.card{
background:#fff;border-radius:12px;padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.card img{
width:100%;height:130px;object-fit:contain;background:#fff;
}

/* DETAIL */
.detail-img{
width:100%;height:250px;object-fit:contain;background:#fff;
}

/* TEXT */
.price{text-decoration:line-through;color:gray}
.discount{color:#000;font-weight:bold}

/* SIZE */
.size-box{
padding:10px;border:2px solid #000;
display:inline-block;margin:10px 0;
}

/* BUTTON */
button{
width:100%;padding:10px;margin-top:10px;
background:#000;color:#fff;border:none;border-radius:6px;
}

/* PAGE */
.page{display:none}
.active{display:block}

.back{padding:10px;font-weight:bold;cursor:pointer}

/* CART */
.cart-item{border-bottom:1px solid #ddd;padding:10px}
</style>
</head>

<body>

<div id="splash"><img id="logo" src="logo.png"></div>

<div class="sidebar" id="sidebar">
<div onclick="goHome()">Home</div>
<div onclick="openCategory('beauty')">Beauty</div>
<div onclick="openCategory('perfume')">Perfumes</div>
<div onclick="openCategory('wholesale')">Wholesale</div>
</div>

<div class="header">
<div onclick="toggleMenu()">☰</div>
<b>MANLET</b>
<div onclick="openCart()">🛒</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="products" id="homeProducts"></div>
</div>

<!-- CATEGORY -->
<div id="categoryPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div class="products" id="categoryProducts"></div>
</div>

<!-- DETAIL -->
<div id="detailPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div id="detailBox"></div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>

<input id="name" placeholder="Name" style="width:90%;margin:10px;padding:10px">
<input id="address" placeholder="Address" style="width:90%;margin:10px;padding:10px">

<div id="cartItems"></div>
<h3 id="total"></h3>

<button onclick="checkout()">Buy Now</button>
</div>

<script>

setTimeout(()=>splash.style.display="none",2000)

let cart=[]

const data=[
{name:"Jasmine Hair Oil",cat:"beauty",mrp:425,price:297,disc:"30%",qty:"250ml",desc:"Hair nourishment oil",img:"oil.jpg"},
{name:"Lotus Sunscreen",cat:"beauty",mrp:240,price:204,disc:"15%",qty:"100g",desc:"UV protection sunscreen",img:"sunscreen.jpg"},
{name:"Streax Serum",cat:"beauty",mrp:340,price:323,disc:"5%",qty:"100ml",desc:"Smooth hair serum",img:"serum.jpg"},
{name:"Mamaearth Facewash",cat:"beauty",mrp:269,price:242,disc:"10%",qty:"150ml",desc:"Glow facewash",img:"facewash.jpg"},
{name:"Axe Deodorant",cat:"perfume",mrp:499,price:280,disc:"30%",qty:"150ml",desc:"Long lasting deodorant",img:"axe.jpg"},

{name:"Triple choco(full box)",cat:"wholesale",mrp:150,price:120,disc:"20%",qty:"Box",desc:"Bulk chocolate box",img:"w1.jpg"},
{name:"chokers(full box)",cat:"wholesale",mrp:150,price:130,disc:"14%",qty:"Box",desc:"Bulk chokers pack",img:"w2.jpg"},
{name:"choco stick(full jar)",cat:"wholesale",mrp:150,price:120,disc:"20%",qty:"Jar",desc:"Chocolate sticks jar",img:"w3.jpg"}
]

function toggleMenu(){
sidebar.style.left=sidebar.style.left=="0px"?"-220px":"0px"
}

function show(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))
p.classList.add("active")
}

function goHome(){
toggleMenu()
show(home)
}

function loadHome(){
homeProducts.innerHTML=""
data.filter(p=>p.cat!="wholesale")
.forEach(p=>homeProducts.innerHTML+=card(p))
}
loadHome()

function card(p){
return `<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}" onerror="this.src='logo.png'">
<h4>${p.name}</h4>
<p>${p.qty}</p>
<p class="price">₹${p.mrp}</p>
<p>₹${p.price}</p>
</div>`
}

function openCategory(cat){
toggleMenu()
show(categoryPage)
let list=data.filter(p=>p.cat==cat)
categoryProducts.innerHTML=""
list.forEach(p=>categoryProducts.innerHTML+=card(p))
}

function openDetail(name){
show(detailPage)
let p=data.find(x=>x.name==name)

detailBox.innerHTML=`
<img src="${p.img}" class="detail-img">
<h2>${p.name}</h2>
<p>${p.desc}</p>
<p class="price">₹${p.mrp}</p>
<h3>₹${p.price}</h3>
<div class="size-box">${p.qty}</div>

<button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
<button onclick="addCart('${p.name}')">Add to Cart</button>
`
}

function addCart(name){
let item=cart.find(x=>x.name==name)
if(item)item.qty++
else cart.push({name,qty:1})
alert("Added to cart")
}

function openCart(){
show(cartPage)
cartItems.innerHTML=""
let total=0

cart.forEach(p=>{
let d=data.find(x=>x.name==p.name)
let sub=d.price*p.qty
total+=sub
cartItems.innerHTML+=`<div class="cart-item">${p.name} x${p.qty} = ₹${sub}</div>`
})

total.innerText="Total ₹"+total
}

function checkout(){
let n=name.value
let a=address.value
let msg="Order%0A"+n+"%0A"+a+"%0A"

cart.forEach(p=>{
msg+=p.name+" x"+p.qty+"%0A"
})

window.open(`https://wa.me/918638618446?text=${msg}`)
}

function buyNow(name,price){
let n=prompt("Name")
let a=prompt("Address")
let msg=`Order%0A${name}%0A₹${price}%0A${n}%0A${a}`
window.open(`https://wa.me/918638618446?text=${msg}`)
}

function goBack(){history.back()}
window.onpopstate=()=>show(home)

</script>

</body>
</html>
