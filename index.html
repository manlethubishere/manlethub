<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANLET</title>

<style>
body{margin:0;font-family:Arial;background:#f9f9f9}

/* SPLASH */
#splash{
position:fixed;width:100%;height:100%;
background:white;display:flex;justify-content:center;align-items:center;
z-index:999;
}
#logo{width:130px;animation:zoom 2.5s ease;}
@keyframes zoom{
0%{transform:scale(0.5);opacity:0}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:white;border-bottom:1px solid #eee;
}

/* SIDEBAR */
.sidebar{
position:fixed;left:-220px;top:0;width:200px;height:100%;
background:#22c55e;color:white;transition:.3s;z-index:100;
}
.sidebar div{
padding:14px;border-bottom:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:10px;
}
.card{
background:white;border-radius:12px;padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.card img{
width:100%;
height:130px;
object-fit:contain;
background:#fff;
border-radius:10px;
}

/* DETAIL */
.detail-img{
width:100%;
height:250px;
object-fit:contain;
background:#fff;
border-radius:12px;
}

/* TEXT */
.price{text-decoration:line-through;color:gray}
.discount{color:#22c55e}

/* SIZE BOX */
.size-box{
display:inline-block;
padding:10px 18px;
border-radius:10px;
border:2px solid #22c55e;
background:#22c55e;
color:white;
margin:10px 0;
}

/* PAGE */
.page{display:none}
.active{display:block}

.back{padding:10px;font-weight:bold;cursor:pointer}

button{
width:100%;padding:10px;margin-top:10px;
background:#22c55e;color:white;border:none;border-radius:8px;
}
</style>
</head>

<body>

<div id="splash"><img id="logo" src="logo.png"></div>

<div class="sidebar" id="sidebar">
<div onclick="goHome()">Home</div>
<div onclick="openCategory('perfume')">Perfumes</div>
<div onclick="openCategory('beauty')">Beauty</div>
<div onclick="openCategory('wholesale')">Wholesale</div>
</div>

<div class="header">
<div onclick="toggleMenu()">☰</div>
<b>MANLET</b>
<div>🛒</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="products" id="homeProducts"></div>
</div>

<!-- CATEGORY -->
<div id="categoryPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div class="products" id="categoryProducts"></div>
</div>

<!-- DETAIL -->
<div id="detailPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div id="detailBox"></div>
</div>

<script>

setTimeout(()=>splash.style.display="none",2500)

const data=[

// NORMAL PRODUCTS
{name:"Jasmine Hair Oil",cat:"beauty",mrp:425,price:297,disc:"30%",qty:"250ml",img:"oil.jpg"},

]

function toggleMenu(){
sidebar.style.left = sidebar.style.left=="0px"?"-220px":"0px"
}

function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))
p.classList.add("active")
}

function goHome(){
toggleMenu()
showPage(home)
history.pushState({}, "")
}

function loadHome(){
homeProducts.innerHTML=""
data.filter(p=>p.cat!="wholesale")
.forEach(p=>homeProducts.innerHTML+=card(p))
}
loadHome()

function card(p){
return `<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}" onerror="this.src='logo.png'">
<h4>${p.name}</h4>
<p>${p.qty}</p>
<p class="price">₹${p.mrp}</p>
<p>₹${p.price} <span class="discount">${p.disc}</span></p>
</div>`
}

function openCategory(cat){
toggleMenu()
showPage(categoryPage)

let list=data.filter(p=>p.cat==cat)

categoryProducts.innerHTML=""
list.forEach(p=>categoryProducts.innerHTML+=card(p))

history.pushState({}, "")
}

function openDetail(name){
showPage(detailPage)
let p=data.find(x=>x.name==name)

detailBox.innerHTML=`
<img src="${p.img}" class="detail-img">
<h2>${p.name}</h2>
<p class="price">₹${p.mrp}</p>
<h3>₹${p.price}</h3>
<h4>Size:</h4>
<div class="size-box">${p.qty}</div>
<button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
`

history.pushState({}, "")
}

function goBack(){history.back()}

window.onpopstate=()=>showPage(home)

function buyNow(name,price){
let n=prompt("Name")
let a=prompt("Address")
if(!n||!a)return
let msg=`Order%0A${name}%0A₹${price}%0A${n}%0A${a}`
window.open(`https://wa.me/918638618446?text=${msg}`)
}

</script>

</body>
</html>
