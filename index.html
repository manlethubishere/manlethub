<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANLET</title>

<style>
body{margin:0;font-family:Arial;background:white}

/* SPLASH */
#splash{
position:fixed;width:100%;height:100%;
background:white;display:flex;justify-content:center;align-items:center;z-index:999;
}
#logo{width:130px;animation:anim 2.8s ease forwards;}
@keyframes anim{
0%{transform:scale(0.6);opacity:0}
30%{opacity:1;transform:scale(1.2);filter:drop-shadow(0 0 25px #ff3f6c)}
60%{transform:scale(1)}
100%{transform:scale(0.7);filter:none}
}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:10px;border-bottom:1px solid #eee;
}
.logoBox{display:flex;align-items:center;gap:8px}
.logoBox img{width:28px}
.menu{font-size:22px;cursor:pointer}
.cart{font-size:20px;cursor:pointer}

/* SIDEBAR */
.sidebar{
position:fixed;left:-220px;top:0;width:200px;height:100%;
background:#0b2e13;color:white;transition:.3s;z-index:100;
}
.sidebar div{padding:15px;border-bottom:1px solid rgba(255,255,255,0.2);cursor:pointer}

/* HOME */
.home{padding:15px}
.search{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:10px}
.card{border:1px solid #eee;border-radius:10px;padding:10px}
.card img{width:100%;height:120px;object-fit:cover}
.price{text-decoration:line-through;color:gray}
.discount{color:green}

/* PAGES */
.page{display:none;padding:15px}
.back{font-weight:bold;margin-bottom:10px;cursor:pointer}

/* DETAIL */
.detail img{width:100%;height:200px;object-fit:cover}
button{width:100%;padding:10px;margin-top:8px;border:none;background:#0b2e13;color:white;border-radius:6px}

/* CART */
.cartItem{display:flex;justify-content:space-between;margin-bottom:10px}
.qty button{padding:5px}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash"><img id="logo" src="logo.png"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div onclick="openCat('perfume')">Perfumes</div>
<div onclick="openCat('grocery')">Grocery</div>
<div onclick="openCat('beverages')">Beverages</div>
<div onclick="openCat('namkeen')">Namkeen</div>
<div onclick="openCat('beauty')">Beauty</div>
<div onclick="openCat('fashion')">Fashion</div>
<div onclick="openCat('electronics')">Electronics</div>
</div>

<!-- HEADER -->
<div class="header">
<div class="menu" onclick="toggleMenu()">☰</div>
<div class="logoBox"><img src="logo.png"><b>MANLET</b></div>
<div class="cart" onclick="openCart()">🛒</div>
</div>

<!-- HOME -->
<div class="home" id="home">
<input class="search" placeholder="Search">
<div class="products" id="homeProducts"></div>
</div>

<!-- CATEGORY -->
<div class="page" id="catPage">
<div class="back" onclick="goHome()">⬅ Back</div>
<div class="products" id="catProducts"></div>
</div>

<!-- DETAIL -->
<div class="page" id="detailPage">
<div class="back" onclick="goHome()">⬅ Back</div>
<div id="detail"></div>
</div>

<!-- CART -->
<div class="page" id="cartPage">
<div class="back" onclick="goHome()">⬅ Back</div>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="checkout()">Buy Now</button>
</div>

<script>

setTimeout(()=>{splash.style.display="none"},2800)

const phone="918638618446"
let cart=[]

const data=[
{name:"Vokka Perfume",cat:"perfume",price:250,img:"vokka-perfume.jpg"},
{name:"Tata Haldi",cat:"grocery",price:150,img:"tata-haldi.jpg"},
{name:"Mamaearth Facewash",cat:"beauty",price:150,img:"mamaearth-facewash.jpg"},
{name:"GenZ T-Shirt",cat:"fashion",price:150,img:"genz-tshirt.jpg"},
{name:"Aloo Bhujia",cat:"namkeen",price:100,img:"aloo-bhujia.jpg"},
{name:"Coca Cola",cat:"beverages",price:40,img:"cocacola.jpg"},
{name:"Smart TV",cat:"electronics",price:4699,img:"smart-tv.jpg"}
]

function toggleMenu(){
sidebar.style.left= sidebar.style.left=="0px"?"-220px":"0px"
}

function showHome(){
home.style.display="block"
catPage.style.display="none"
detailPage.style.display="none"
cartPage.style.display="none"
}

function openCat(cat){
sidebar.style.left="-220px"
home.style.display="none"
catPage.style.display="block"
catProducts.innerHTML=""
data.filter(p=>p.cat==cat).forEach(p=>catProducts.innerHTML+=card(p))
}

function card(p){
return `<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
</div>`
}

function openDetail(name){
home.style.display="none"
catPage.style.display="none"
detailPage.style.display="block"

let p=data.find(x=>x.name==name)

detail.innerHTML=`
<div class="detail">
<img src="${p.img}">
<h2>${p.name}</h2>
<h3>₹${p.price}</h3>
<button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
<button onclick="addCart('${p.name}')">Add to Cart</button>
</div>`
}

function buyNow(name,price){
let msg=`Order:%0A${name}%0APrice: ₹${price}`
window.open(`https://wa.me/${phone}?text=${msg}`)
}

function addCart(name){
let f=cart.find(x=>x.name==name)
if(f)f.qty++
else cart.push({name,qty:1})
alert("Added")
}

function openCart(){
home.style.display="none"
cartPage.style.display="block"
catPage.style.display="none"
detailPage.style.display="none"

let t=0
cartItems.innerHTML=""
cart.forEach(p=>{
let item=data.find(x=>x.name==p.name)
let sub=item.price*p.qty
t+=sub

cartItems.innerHTML+=`
<div class="cartItem">
${p.name}
<div class="qty">
<button onclick="changeQty('${p.name}',-1)">-</button>
${p.qty}
<button onclick="changeQty('${p.name}',1)">+</button>
</div>
</div>`
})

total.innerText="Total: ₹"+t
}

function changeQty(name,v){
let f=cart.find(x=>x.name==name)
f.qty+=v
if(f.qty<=0)cart=cart.filter(x=>x.name!=name)
openCart()
}

function checkout(){
let msg="Order:%0A"
let t=0
cart.forEach(p=>{
let item=data.find(x=>x.name==p.name)
let sub=item.price*p.qty
t+=sub
msg+=`${p.name} x${p.qty} = ₹${sub}%0A`
})
msg+=`Total: ₹${t}`
window.open(`https://wa.me/${phone}?text=${msg}`)
}

function goHome(){showHome()}

data.forEach(p=>homeProducts.innerHTML+=card(p))

showHome()

</script>

</body>
</html>
