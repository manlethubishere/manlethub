<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANLET</title>

<style>
body{margin:0;font-family:Arial;background:#f9f9f9;padding-bottom:70px}

/* SPLASH */
#splash{
position:fixed;width:100%;height:100%;
background:white;display:flex;justify-content:center;align-items:center;
z-index:999;
}
#logo{width:130px;animation:anim 3s ease forwards;}
@keyframes anim{
0%{transform:scale(0.6);opacity:0}
30%{opacity:1;transform:scale(1.2);filter:drop-shadow(0 0 25px #22c55e)}
100%{transform:scale(0.8)}
}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:white;border-bottom:1px solid #eee;
}

/* SIDEBAR */
.sidebar{
position:fixed;left:-220px;top:0;width:200px;height:100%;
background:#22c55e;color:white;transition:.3s;
}
.sidebar div{padding:15px;border-bottom:1px solid rgba(255,255,255,0.2);cursor:pointer}

/* PRODUCTS */
.products{
display:grid;grid-template-columns:repeat(2,1fr);
gap:12px;padding:10px;
}
.card{
background:white;border-radius:12px;padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.card img{
width:100%;height:130px;object-fit:cover;border-radius:10px;
}

.price{ text-decoration:line-through;color:gray;font-size:12px }
.discount{ color:#22c55e;font-weight:bold;font-size:12px }

/* PAGE */
.page{display:none;}
.active{display:block;}

.back{padding:10px;font-weight:bold;cursor:pointer}

/* BUTTON */
button{
width:100%;padding:10px;margin-top:8px;
background:#22c55e;color:white;border:none;border-radius:6px;
}
</style>
</head>

<body>

<div id="splash"><img id="logo" src="logo.png"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div onclick="openCat('perfume')">Perfumes</div>
<div onclick="openCat('grocery')">Grocery</div>
<div onclick="openCat('beverages')">Beverages</div>
<div onclick="openCat('namkeen')">Namkeen</div>
<div onclick="openCat('beauty')">Beauty</div>
<div onclick="openCat('fashion')">Fashion</div>
<div onclick="openCat('electronics')">Electronics</div>
</div>

<!-- HEADER -->
<div class="header">
<div onclick="toggleMenu()">☰</div>
<b>MANLET</b>
<div onclick="openCart()">🛒</div>
</div>

<!-- HOME -->
<div id="home" class="active">
<div class="products" id="homeProducts"></div>
</div>

<!-- CATEGORY -->
<div id="catPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div class="products" id="catProducts"></div>
</div>

<!-- DETAIL -->
<div id="detailPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div id="detail"></div>
</div>

<script>

setTimeout(()=>splash.style.display="none",3000)

const data=[
{name:"Jasmine Hair Oil",cat:"beauty",mrp:425,price:297,disc:"30%",img:"jasmine-oil.jpg"},
{name:"Lotus Sunscreen",cat:"beauty",mrp:240,price:204,disc:"15%",img:"lotus.jpg"},
{name:"Streax Serum",cat:"beauty",mrp:340,price:323,disc:"5%",img:"streax.jpg"},
{name:"Mamaearth Facewash",cat:"beauty",mrp:269,price:242,disc:"10%",img:"facewash.jpg"},
{name:"Axe Deodorant",cat:"perfume",mrp:499,price:280,disc:"30%",img:"axe.jpg"}
]

function toggleMenu(){
sidebar.style.left = sidebar.style.left=="0px" ? "-220px" : "0px"
}

function card(p){
return `<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}" onerror="this.src='logo.png'">
<h4>${p.name}</h4>
<p class="price">₹${p.mrp}</p>
<p>₹${p.price} <span class="discount">${p.disc}</span></p>
</div>`
}

/* LOAD HOME */
function loadHome(){
homeProducts.innerHTML=""
data.forEach(p=>homeProducts.innerHTML+=card(p))
}
loadHome()

/* CATEGORY */
function openCat(cat){
toggleMenu()
home.classList.remove("active")
catPage.classList.add("active")

let list=data.filter(p=>p.cat==cat)

if(list.length==0){
catProducts.innerHTML="<p style='padding:10px'>No products available</p>"
return
}

catProducts.innerHTML=""
list.forEach(p=>catProducts.innerHTML+=card(p))

history.pushState({page:"cat"},"")
}

/* DETAIL */
function openDetail(name){
catPage.classList.remove("active")
detailPage.classList.add("active")

let p=data.find(x=>x.name==name)

detail.innerHTML=`
<img src="${p.img}" onerror="this.src='logo.png'">
<h2>${p.name}</h2>
<p class="price">₹${p.mrp}</p>
<h3>₹${p.price} (${p.disc})</h3>
<button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
`

history.pushState({page:"detail"},"")
}

/* BACK */
function goBack(){
history.back()
}

window.onpopstate=function(){
home.classList.add("active")
catPage.classList.remove("active")
detailPage.classList.remove("active")
}

/* WHATSAPP */
function buyNow(name,price){
let n=prompt("Name")
let a=prompt("Address")
if(!n||!a)return

let msg=`🛒 Order%0AName:${n}%0AAddress:${a}%0A${name}%0A₹${price}`
window.open(`https://wa.me/918638618446?text=${msg}`)
}

</script>

</body>
</html>
