<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANLET</title>

<style>
body{margin:0;font-family:Arial;background:#f9f9f9;padding-bottom:70px}

/* SPLASH */
#splash{
position:fixed;width:100%;height:100%;
background:white;display:flex;justify-content:center;align-items:center;
z-index:999;
}
#logo{
width:130px;
animation:anim 3s ease forwards;
}
@keyframes anim{
0%{transform:scale(0.6);opacity:0}
30%{opacity:1;transform:scale(1.2);filter:drop-shadow(0 0 25px #22c55e)}
60%{transform:scale(1)}
100%{transform:scale(0.75)}
}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:white;border-bottom:1px solid #eee;
position:sticky;top:0;
}

/* SIDEBAR */
.sidebar{
position:fixed;left:-220px;top:0;width:200px;height:100%;
background:#22c55e;color:white;transition:.3s;z-index:100;
}
.sidebar div{
padding:15px;border-bottom:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

/* SEARCH */
.search{
width:90%;margin:10px;padding:10px;border-radius:8px;border:1px solid #ccc;
}

/* PRODUCTS */
.products{
display:grid;grid-template-columns:repeat(2,1fr);
gap:12px;padding:10px;
}
.card{
background:white;border-radius:12px;padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.card img{
width:100%;height:130px;object-fit:cover;border-radius:10px;
}
.price{
text-decoration:line-through;color:gray;font-size:12px;
}
.discount{
color:#22c55e;font-weight:bold;font-size:12px;
}

/* PAGE */
.page{display:none;}
.active{display:block;}

.back{
padding:10px;
font-weight:bold;
cursor:pointer;
}

/* DETAIL */
.detail img{
width:100%;height:200px;object-fit:cover;border-radius:12px;
}

/* BUTTON */
button{
width:100%;padding:12px;margin-top:10px;
background:#22c55e;color:white;border:none;border-radius:8px;
}

/* FLOAT CART */
.floatCart{
position:fixed;bottom:80px;right:15px;
background:#22c55e;color:white;padding:12px;border-radius:50%;
}

/* BOTTOM NAV */
.bottomNav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:white;border-top:1px solid #eee;padding:8px 0;
}
.bottomNav div{text-align:center;font-size:12px;cursor:pointer}

/* FOOTER */
.footer{
background:#22c55e;color:white;padding:15px;text-align:center;margin-top:20px;
}
</style>
</head>

<body>

<div id="splash"><img id="logo" src="logo.png"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div onclick="openCat('perfume')">Perfumes</div>
<div onclick="openCat('grocery')">Grocery</div>
<div onclick="openCat('beverages')">Beverages</div>
<div onclick="openCat('namkeen')">Namkeen</div>
<div onclick="openCat('beauty')">Beauty</div>
<div onclick="openCat('fashion')">Fashion</div>
<div onclick="openCat('electronics')">Electronics</div>
</div>

<!-- HEADER -->
<div class="header">
<div onclick="toggleMenu()">☰</div>
<b>MANLET</b>
<div onclick="openCart()">🛒</div>
</div>

<!-- HOME -->
<div id="home" class="active">
<input class="search" placeholder="Search..." oninput="searchProducts(this.value)">
<div class="products" id="homeProducts"></div>
</div>

<!-- CATEGORY -->
<div id="catPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div class="products" id="catProducts"></div>
</div>

<!-- DETAIL -->
<div id="detailPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>
<div id="detail"></div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
<div class="back" onclick="goBack()">⬅ Back</div>

<input id="custName" class="search" placeholder="Your Name">
<input id="custAddr" class="search" placeholder="Your Address">

<div id="cartItems"></div>
<h3 id="total"></h3>

<button onclick="checkout()">Buy Now</button>
</div>

<div class="floatCart" onclick="openCart()">🛒</div>

<div class="footer">
<h3>Customer Service</h3>
<p>+91 86386 18446</p>
<p>+91 8822873317</p>
<p>manlethub@gmail.com</p>
</div>

<div class="bottomNav">
<div onclick="goHome()">🏠<br>Home</div>
<div onclick="toggleMenu()">📂<br>Menu</div>
<div onclick="openCart()">🛒<br>Cart</div>
</div>

<script>

setTimeout(()=>splash.style.display="none",3000)

const phone="918638618446"
let cart=[]
let qty=1

const data=[
{name:"Jasmine Hair Oil",cat:"beauty",mrp:425,price:297,disc:"30%",img:"jasmine-oil.jpg"},
{name:"Lotus Safe Sunscreen",cat:"beauty",mrp:240,price:204,disc:"15%",img:"lotus.jpg"},
{name:"Streax Hair Serum",cat:"beauty",mrp:340,price:323,disc:"5%",img:"streax.jpg"},
{name:"Mamaearth Turmeric Facewash",cat:"beauty",mrp:269,price:242,disc:"10%",img:"facewash.jpg"},
{name:"Axe Deodorant",cat:"perfume",mrp:499,price:280,disc:"30%",img:"axe.jpg"}
]

function toggleMenu(){
sidebar.style.left=sidebar.style.left=="0px"?"-220px":"0px"
}

function card(p){
return `<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}">
<h4>${p.name}</h4>
<p class="price">₹${p.mrp}</p>
<p>₹${p.price} <span class="discount">${p.disc} OFF</span></p>
</div>`
}

function loadHome(){
homeProducts.innerHTML=""
data.forEach(p=>homeProducts.innerHTML+=card(p))
}
loadHome()

function searchProducts(q){
homeProducts.innerHTML=""
data.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()))
.forEach(p=>homeProducts.innerHTML+=card(p))
}

function openCat(cat){
toggleMenu()
home.classList.remove("active")
catPage.classList.add("active")

let filtered=data.filter(p=>p.cat==cat)

if(filtered.length==0){
catProducts.innerHTML="<p style='padding:10px'>No products available</p>"
return
}

catProducts.innerHTML=""
filtered.forEach(p=>catProducts.innerHTML+=card(p))

history.pushState({page:"cat"},"")
}

function openDetail(name){
catPage.classList.remove("active")
detailPage.classList.add("active")

let p=data.find(x=>x.name==name)

detail.innerHTML=`
<div class="detail">
<img src="${p.img}">
<h2>${p.name}</h2>
<p class="price">₹${p.mrp}</p>
<h3>₹${p.price} (${p.disc} OFF)</h3>

<button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
<button onclick="addCart('${p.name}')">Add to Cart</button>
</div>
`

history.pushState({page:"detail"},"")
}

function goHome(){
home.classList.add("active")
catPage.classList.remove("active")
detailPage.classList.remove("active")
cartPage.classList.remove("active")
}

function goBack(){
history.back()
}

window.onpopstate=function(){
goHome()
}

function buyNow(name,price){
let n=prompt("Enter Name")
let a=prompt("Enter Address")
if(!n||!a)return

let msg=`🛒 MANLET ORDER%0AName:${n}%0AAddress:${a}%0AProduct:${name}%0A₹${price}`
window.open(`https://wa.me/${phone}?text=${msg}`)
}

function addCart(name){
let f=cart.find(x=>x.name==name)
if(f)f.qty++
else cart.push({name,qty:1})
alert("Added")
}

function openCart(){
home.classList.remove("active")
cartPage.classList.add("active")

let t=0
cartItems.innerHTML=""

cart.forEach(p=>{
let item=data.find(x=>x.name==p.name)
let sub=item.price*p.qty
t+=sub
cartItems.innerHTML+=`<p>${p.name} x${p.qty} = ₹${sub}</p>`
})

total.innerText="Total: ₹"+t

history.pushState({page:"cart"},"")
}

function checkout(){
let n=custName.value
let a=custAddr.value
if(!n||!a)return

let msg=`🛒 MANLET ORDER%0AName:${n}%0AAddress:${a}%0A`
cart.forEach(p=>{
let item=data.find(x=>x.name==p.name)
msg+=`${p.name} x${p.qty}%0A`
})
window.open(`https://wa.me/${phone}?text=${msg}`)
}

</script>

</body>
</html>
